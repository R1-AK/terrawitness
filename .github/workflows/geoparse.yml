name: Geoparse RSS feeds

on:
  schedule:
    - cron: '0 2 * * *'     # daily at 02:00 UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  geoparse:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit incidents_live.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install feedparser geopandas shapely

      - name: Run geoparse pipeline
        run: python pipeline/fetch_and_geoparse.py

      - name: Commit if new incidents found
        run: |
          git config user.name  "TerraWitness Bot"
          git config user.email "bot@terrawitness.app"
          git add public/incidents_live.json pipeline/seen_hashes.json
          if git diff --cached --quiet; then
            echo "No new incidents — skipping commit"
          else
            git commit -m "chore: update live incidents [skip ci]"
            git push
          fi
